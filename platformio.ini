; PlatformIO Project Configuration File for Seeed Studio XIAO RP2040
;
; For the Seeed Studio XIAO RP2040, the community-maintained maxgerhardt platform
; (which uses the superior Earle Philhower Arduino-Pico core) is highly recommended.
;
; If you prefer the official Seeed Studio platform package, you can uncomment
; the alternate platform/board lines.

[env:seeed_xiao_rp2040]
; Community-maintained Arduino-Pico core (recommended for RP2040)
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
board_build.core = earlephilhower

; Alternate: Official Seeed Studio platform
; platform = https://github.com/Seeed-Studio/platform-seeedboards.git
; board = seeed-xiao-rp2040

framework = arduino

lib_deps =
    olikraus/U8g2
